services:
  - type: web
    name: rwanda-school-accessibility
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATA_DIR
        value: /opt/render/project/src/DATA
      - key: SPATIALITE_DB
        value: /opt/render/project/src/data/gis_database.db
